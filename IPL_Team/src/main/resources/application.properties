spring.application.name=IPL_Team

# redis cache configuration
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.username=admin
spring.data.redis.password=admin

# ms server port number
server.port=9191

# link with config server
spring.config.import=optional:configserver:

# register with eureka server
eureka.client.service-url.defaultZone=http://localhost:8761

# Enable all actuator endpoints
management.endpoints.web.exposure.include=*

# Show complete health details
management.endpoint.health.show-details=always

# Enable health endpoint
management.endpoint.health.enabled=true

# Enable shutdown endpoint (disabled by default)
management.endpoint.shutdown.enabled=true

# Change actuator base path
management.endpoints.web.base-path=/actuator

# Enable info endpoint
management.info.env.enabled=true

# Application information
info.app.name=Doctor Service
info.app.description=Spring Boot Microservice
info.app.version=1.0

# Enable metrics endpoint
management.endpoint.metrics.enabled=true

# Enable prometheus endpoint (if dependency is added)
management.endpoint.prometheus.enabled=true

# Enable all health indicators
management.health.defaults.enabled=true

# Enable liveness and readiness probes
management.endpoint.health.probes.enabled=true

# Always show components in health endpoint
management.endpoint.health.show-components=always